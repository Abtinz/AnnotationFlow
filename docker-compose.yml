services:
  backend:
    build:
      context: ./backend
    env_file:
      - .env
    ports:
      - "8000:8000"
    volumes:
      - ./backend/app:/app/app
      - ./uploads:/app/uploads
      - ./output:/app/output

  mobile:
    build:
      context: ./mobile
    environment:
      EXPO_PUBLIC_API_BASE_URL: http://localhost:8000
    ports:
      - "8081:8081"
    depends_on:
      - backend

